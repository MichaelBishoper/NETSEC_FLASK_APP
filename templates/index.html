<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGU Portal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}?v=2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,100..900;1,100..900&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="logo-container">
        <img src="{{ url_for('static', filename='images/sgu_logop.png') }}" class="sgu-logo" alt="sgu logo">
    </div>
    <h1 class="title">Welcome to the SGU Portal</h1>
    <div class="container">
    <form action="">
        <div class="username">
            <label for="username">Username: </label>
            <input type="text" id="username" name="password" required>
        </div>
        <div class="password">
            <label for="password">Password: </label>
            <input type="password" id="password" name="password" required>
        </div>
        <div class="submit">
            <input type="submit" value="Log In">
        </div>
    </form>
    </div>
    
</body>
</html>
